<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema de Ocorrências</title>

<link rel="stylesheet" href="style.css">

<script>

function mostrar(secao){

document.getElementById("menu").style.display="none";
document.getElementById("turma").style.display="none";
document.getElementById("aluno").style.display="none";
document.getElementById("professor").style.display="none";
document.getElementById("ocorrencia").style.display="none";

document.getElementById(secao).style.display="block";

}

function voltar(){

document.getElementById("menu").style.display="flex";
document.getElementById("turma").style.display="none";
document.getElementById("aluno").style.display="none";
document.getElementById("professor").style.display="none";
document.getElementById("ocorrencia").style.display="none";

}

async function cadastrarTurma(event){

event.preventDefault();

const curso = document.getElementById("curso").value;
const serie = document.getElementById("serie").value;
const ano = document.getElementById("ano").value;

try{

const resposta = await fetch("http://localhost:3000/turma",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

serie: serie,
curso_tecnico: curso,
ano: ano

})

});

if(resposta.ok){

alert("Turma cadastrada com sucesso!");

}else{

alert("Erro ao cadastrar turma");

}

}catch(erro){

console.log(erro);
alert("Erro ao conectar com a API");

}

}
</script>

</head>

<body>

<div class="container">

<h1>Sistema de Ocorrências</h1>
<p class="subtitulo">Menu principal</p>

<!-- MENU -->

<div id="menu" class="menu">

<button class="botao" onclick="mostrar('aluno')">Cadastrar Aluno</button>

<button class="botao" onclick="mostrar('turma')">Cadastrar Turma</button>

<button class="botao" onclick="mostrar('professor')">Cadastrar Professor</button>

<button class="botao" onclick="mostrar('ocorrencia')">Registrar Ocorrência</button>

</div>

<!-- CADASTRO ALUNO -->

<div id="aluno" style="display:none">

<h2>Cadastro de Aluno</h2>

<form>

<div class="form-group">
<label>Nome do aluno</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Matrícula</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Turma</label>
<select required>

<option>Selecione</option>
<option>1º Ano Administração</option>
<option>1º Ano Agropecuária</option>
<option>1º Ano Informática</option>
<option>1º Ano Sistemas de Energias Renováveis</option>
<option>2º Ano Administração</option>
<option>2º Ano Agropecuária</option>
<option>2º Ano Informática</option>
<option>2º Ano Sistemas de Energias Renováveis</option>
<option>3º Ano Administração</option>
<option>3º Ano Agropecuária</option>
<option>3º Ano Informática</option>
<option>3º Ano Sistemas de Energias Renováveis</option>

</select>
</div>

<div class="form-group">
<label>Data de nascimento</label>
<input type="date" required>
</div>

<div class="form-group">
<label>Responsável</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Telefone do responsável</label>
<input type="tel" required>
</div>

<button type="submit">Cadastrar Aluno</button>

</form>

<br>

<button class="botao" onclick="voltar()">Voltar ao menu</button>

</div>

<!-- CADASTRO TURMA -->

<div id="turma" style="display:none">

<h2>Cadastro de Turma</h2>

<form onsubmit="cadastrarTurma(event)">

<div class="form-group">
<label>Curso Técnico</label>
<input type="text" id="curso" required>
</div>

<div class="form-group">
<label>Série</label>
<input type="number" id="serie" min="1" max="9" required>
</div>

<div class="form-group">
<label>Ano letivo</label>
<input type="number" id="ano" placeholder="2026" required>
</div>

<button type="submit">Cadastrar Turma</button>

</form>

<br>

<button class="botao" onclick="voltar()">Voltar ao menu</button>

</div>

<!-- CADASTRO PROFESSOR -->

<div id="professor" style="display:none">

<h2>Cadastro de Professor</h2>

<form>

<div class="form-group">
<label>Nome do professor</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Disciplina</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" required>
</div>

<div class="form-group">
<label>Telefone</label>
<input type="tel" required>
</div>

<button type="submit">Cadastrar Professor</button>

</form>

<br>

<button class="botao" onclick="voltar()">Voltar ao menu</button>

</div>

<!-- REGISTRO OCORRENCIA -->

<div id="ocorrencia" style="display:none">

<h2>Registro de Ocorrência</h2>

<form>

<div class="form-group">
<label>Aluno</label>
<input type="text" placeholder="Digite o nome do aluno" required>
</div>

<div class="form-group">
<label>Turma</label>
<select required>

<option>1º Ano Administração</option>
<option>1º Ano Agropecuária</option>
<option>1º Ano Informática</option>
<option>1º Ano Sistemas de Energias Renováveis</option>
<option>2º Ano Administração</option>
<option>2º Ano Agropecuária</option>
<option>2º Ano Informática</option>
<option>2º Ano Sistemas de Energias Renováveis</option>
<option>3º Ano Administração</option>
<option>3º Ano Agropecuária</option>
<option>3º Ano Informática</option>
<option>3º Ano Sistemas de Energias Renováveis</option>

</select>
</div>

<div class="form-group">
<label>Tipo de ocorrência</label>
<select required>

<option>Selecione</option>
<option>Indisciplina</option>
<option>Uso de celular</option>
<option>Desrespeito ao professor</option>
<option>Outros</option>

</select>
</div>

<div class="form-group">
<label>Data da ocorrência</label>
<input type="date" required>
</div>

<div class="form-group">
<label>Professor responsável</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Descrição</label>
<textarea rows="4" required></textarea>
</div>

<button type="submit">Registrar Ocorrência</button>

</form>

<br>

<button class="botao" onclick="voltar()">Voltar ao menu</button>

</div>

</div>

</body>
</html>
